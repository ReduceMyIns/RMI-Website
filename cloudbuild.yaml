steps:
  # Build Docker image from our Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/rmi-website:$COMMIT_SHA
      - .

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/rmi-website:$COMMIT_SHA

  # Deploy to Cloud Run as a single container
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - reducemyinsurance-net
      - --image=gcr.io/$PROJECT_ID/rmi-website:$COMMIT_SHA
      - --region=us-west1
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000

images:
  - gcr.io/$PROJECT_ID/rmi-website:$COMMIT_SHA
